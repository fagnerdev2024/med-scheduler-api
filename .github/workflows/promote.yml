name: Promote between environments

on:
  push:
    branches:
      - 'feature/**'
      - develop
      - 'release/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  create-promotion-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create promotion PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          CURRENT_BRANCH="${GITHUB_REF#refs/heads/}"

          create_pr() {
            local target="$1"
            local head="$2"
            local title="$3"
            local body="$4"

            echo "Checking for existing PR from $head to $target..."
            local existing=$(gh pr list --base "$target" --head "$head" --json number --jq 'length')

            if [ "$existing" -gt 0 ]; then
              echo "PR already exists from $head to $target. Skipping."
              return 0
            fi

            echo "Creating PR from $head to $target..."
            gh pr create \
              --base "$target" \
              --head "$head" \
              --title "$title" \
              --body "$body"
          }

          # feature -> develop
          if [[ "$CURRENT_BRANCH" == feature/* ]]; then
            diff_count=$(git rev-list --count "origin/develop..origin/$CURRENT_BRANCH" 2>/dev/null || echo 0)
            if [ "$diff_count" -eq 0 ]; then
              echo "No changes between $CURRENT_BRANCH and develop. Skipping."
              exit 0
            fi
            create_pr "develop" "$CURRENT_BRANCH" \
              "PR criado automaticamente. develop <- $CURRENT_BRANCH" \
              "PR automático para trazer as alterações da feature \`$CURRENT_BRANCH\` para develop."
            exit 0
          fi

          # release -> main
          if [[ "$CURRENT_BRANCH" == release/* ]]; then
            diff_count=$(git rev-list --count "origin/main..origin/$CURRENT_BRANCH" 2>/dev/null || echo 0)
            if [ "$diff_count" -eq 0 ]; then
              echo "No changes between $CURRENT_BRANCH and main. Skipping."
              exit 0
            fi
            create_pr "main" "$CURRENT_BRANCH" \
              "PR criado automaticamente. main <- $CURRENT_BRANCH" \
              "PR automático para promover alterações de $CURRENT_BRANCH para main (produção)."
            exit 0
          fi

          # develop -> release (auto-increment version)
          if [ "$CURRENT_BRANCH" = "develop" ]; then
            develop_ahead=$(git rev-list --count "origin/main..origin/develop" 2>/dev/null || echo 0)
            if [ "$develop_ahead" -eq 0 ]; then
              echo "develop is not ahead of main. No release needed."
              exit 0
            fi

            # find latest release branch by version
            latest_version=$(git ls-remote --heads origin 'release/v*' 2>/dev/null | sed -n 's|.*/release/v||p' | sort -V | tail -1)
            release_branch="release/v${latest_version:-0.0.0}"

            # if latest release branch is merged to main, create the next one
            if [ -n "$latest_version" ]; then
              is_merged=$(gh pr list --state merged --base main --head "$release_branch" --json number --jq 'length')
              if [ "$is_merged" -gt 0 ]; then
                previous_release_branch="$release_branch"
                IFS=. read -r major minor patch <<< "$latest_version"
                minor=$((minor + 1))
                patch=0
                release_branch="release/v${major}.${minor}.${patch}"
                echo "Latest release $previous_release_branch is merged. Creating next release $release_branch."
              else
                echo "Using existing release branch $release_branch."
              fi
            else
              echo "No release branch found. Creating $release_branch."
            fi

            # create release branch from main if it does not exist
            if ! git rev-parse --verify "origin/$release_branch" > /dev/null 2>&1; then
              echo "Creating $release_branch from main..."
              git checkout -B "$release_branch" origin/main
              sed -i -E "s|branch: release/v[0-9]+\\.[0-9]+\\.[0-9]+|branch: $release_branch|" render.yaml
              if ! git diff --quiet; then
                git add render.yaml
                git commit -m "chore: aponta homol para $release_branch"
              fi
              git push -u origin "$release_branch"
              git checkout develop
            else
              echo "$release_branch already exists."
            fi

            diff_count=$(git rev-list --count "origin/$release_branch..origin/develop" 2>/dev/null || echo 0)
            if [ "$diff_count" -eq 0 ]; then
              echo "No changes between develop and $release_branch. Skipping."
            else
              create_pr "$release_branch" "develop" \
                "PR criado automaticamente. $release_branch <- develop" \
                "PR automático para promover alterações de develop para $release_branch (homologação)."
            fi

            # Also ensure the PR to main exists. Push events from the GITHUB_TOKEN do not
            # trigger the release branch workflow, so we create the main PR here as well.
            create_pr "main" "$release_branch" \
              "PR criado automaticamente. main <- $release_branch" \
              "PR automático para promover alterações de $release_branch para main (produção)."
            exit 0
          fi

          echo "Branch $CURRENT_BRANCH not handled for promotion."
