name: Promote between environments

on:
  push:
    branches:
      - 'feature/**'
      - develop

permissions:
  contents: write
  pull-requests: write

jobs:
  create-promotion-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create promotion PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          CURRENT_BRANCH="${GITHUB_REF#refs/heads/}"
          VERSION=$(grep -oP 'version\s*=\s*"\K[^"]+' build.gradle.kts | sed 's/-SNAPSHOT//' || echo "0.0.1")

          if [[ "$CURRENT_BRANCH" == feature/* ]]; then
            TARGET_BRANCH="develop"
            HEAD_BRANCH="$CURRENT_BRANCH"
            TITLE="PR criado automaticamente. develop <- $HEAD_BRANCH"
            BODY="PR automático para trazer as alterações da feature \`$HEAD_BRANCH\` para develop."
          elif [ "$CURRENT_BRANCH" = "develop" ]; then
            TARGET_BRANCH="main"
            HEAD_BRANCH="develop"
            TITLE="PR criado automaticamente. main <- develop"
            BODY="PR automático para promover alterações de develop para main (produção)."
          else
            echo "Branch $CURRENT_BRANCH not handled for promotion."
            exit 0
          fi

          EXISTING=$(gh pr list --base "$TARGET_BRANCH" --head "$HEAD_BRANCH" --json number --jq 'length')

          if [ "$EXISTING" -gt 0 ]; then
            echo "PR already exists from $HEAD_BRANCH to $TARGET_BRANCH. Skipping."
            exit 0
          fi

          gh pr create \
            --base "$TARGET_BRANCH" \
            --head "$HEAD_BRANCH" \
            --title "$TITLE" \
            --body "$BODY"
