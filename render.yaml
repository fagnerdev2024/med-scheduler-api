services:
  - type: web
    runtime: docker
    name: med-scheduler-api-dev
    branch: develop
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: dev
      - key: DATASOURCE_URL
        sync: false
      - key: DATASOURCE_USERNAME
        sync: false
      - key: DATASOURCE_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false

  - type: web
    runtime: docker
    name: med-scheduler-api-homol
    branch: release/v0.4.0
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: homol
      - key: DATASOURCE_URL
        sync: false
      - key: DATASOURCE_USERNAME
        sync: false
      - key: DATASOURCE_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false

  - type: web
    runtime: docker
    name: med-scheduler-api-prod
    branch: main
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATASOURCE_URL
        sync: false
      - key: DATASOURCE_USERNAME
        sync: false
      - key: DATASOURCE_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
