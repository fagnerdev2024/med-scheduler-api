spring:
  application:
    name: med-scheduler-api

  datasource:
    url: ${DATASOURCE_URL}
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}

  flyway:
    locations: classpath:db/migration-postgresql,classpath:db/migration-dev

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  output:
    ansi:
      enabled: always

api:
  security:
    token:
      secret: ${JWT_SECRET}

server:
  port: 8081
  error:
    include-stacktrace: never
