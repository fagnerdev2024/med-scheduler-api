spring:
  application:
    name: api

  datasource:
    url: ${DATASOURCE_URL:jdbc:mysql://host.docker.internal:3306/vollmed_api?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DATASOURCE_USERNAME:root}
    password: ${DATASOURCE_PASSWORD:root}

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  error:
    include-stacktrace: never

api:
  security:
    token:
      secret: ${JWT_SECRET:123456}
