spring:
  application:
    name: med-scheduler-api

  flyway:
    locations: classpath:db/migration-postgresql,classpath:db/migration-dev

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

api:
  security:
    token:
      secret: ${JWT_SECRET}

server:
  error:
    include-stacktrace: never
