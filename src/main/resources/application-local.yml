spring:
  application:
    name: med-scheduler-api

  datasource:
    url: jdbc:postgresql://localhost:5432/medscheduler_local?sslmode=disable
    username: postgres
    password: postgres

  flyway:
    locations: classpath:db/migration-postgresql,classpath:db/migration-local

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

api:
  security:
    token:
      secret: 123456

server:
  error:
    include-stacktrace: never
